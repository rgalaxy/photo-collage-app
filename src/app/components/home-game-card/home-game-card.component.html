<article
  class="home-game-card"
  appTilt
  [tiltMax]="7"
  [class.is-coming-soon]="game.isComingSoon"
  role="button"
  [attr.tabindex]="tabindex"
  [attr.aria-disabled]="game.isComingSoon ? 'true' : 'false'"
  [attr.aria-label]="game.title + (game.isComingSoon ? ' — coming soon' : ' — play now')"
  (click)="onCardClick()"
>
  <div class="card-media">
    @if (!game.isComingSoon) {
      <img [src]="game.imageUrl" [alt]="game.title" loading="lazy" class="media-img" />
    } @else {
      <div class="media-placeholder" aria-hidden="true">
        <span class="lock">▢</span>
        <span>Coming Soon</span>
      </div>
    }

    <div class="media-scanlines" aria-hidden="true"></div>
    <div class="media-spotlight" aria-hidden="true"></div>
    <div class="media-glow" aria-hidden="true"></div>

    @if (game.isComingSoon) {
      <div class="coming-soon-badge">In&nbsp;dev</div>
    } @else {
      <div class="play-pill" aria-hidden="true">
        <span class="play-tri"></span>
        <span>PLAY</span>
      </div>
    }
  </div>

  <div class="card-body">
    <div class="card-tags">
      @for (tag of game.tags; track tag) {
        <span class="tag">{{ tag }}</span>
      }
    </div>
    <h3 class="card-title">{{ game.title }}</h3>
    <p class="card-description">{{ game.description }}</p>
    <div class="card-footer">
      <span class="card-action">
        {{ game.isComingSoon ? "Preview soon" : "Insert coin" }}
        <ng-icon name="radixArrowRight" size="14" />
      </span>
    </div>
  </div>
</article>
